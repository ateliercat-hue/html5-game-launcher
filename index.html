<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 HTML5 Game Launcher</title>

    <!-- JSZip для работы с ZIP-архивами -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
    </script>

    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #222240;
            --accent: #7c4dff;
            --accent2: #b388ff;
            --text: #e0e0e0;
            --text2: #b0b0c0;
            --danger: #ff5252;
            --success: #69f0ae;
            --border: #2a2a40;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(124, 77, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(179, 136, 255, 0.04) 0%, transparent 60%);
        }

        /* ===== HEADER ===== */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .logo {
            font-size: 1.7em;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 20px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            letter-spacing: 0.2px;
            transition: var(--transition);
            white-space: nowrap;
            font-family: inherit;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 15px rgba(124, 77, 255, 0.35);
        }
        .btn-primary:hover {
            background: #6a3ae0;
            box-shadow: 0 6px 22px rgba(124, 77, 255, 0.5);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1.5px solid var(--border);
        }
        .btn-outline:hover {
            border-color: var(--accent);
            background: rgba(124, 77, 255, 0.08);
        }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1.5px solid var(--danger);
        }
        .btn-danger:hover {
            background: rgba(255, 82, 82, 0.1);
        }
        .btn-sm {
            padding: 7px 14px;
            font-size: 0.82em;
            border-radius: 8px;
        }
        .btn-icon {
            width: 38px;
            height: 38px;
            padding: 0;
            border-radius: 50%;
            justify-content: center;
            font-size: 1.2em;
        }

        /* ===== MAIN LAYOUT ===== */
        main {
            flex: 1;
            padding: 24px 28px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ===== DROP ZONE ===== */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 40px 24px;
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
            background: var(--surface);
            position: relative;
            overflow: hidden;
        }
        .drop-zone:hover,
        .drop-zone.drag-active {
            border-color: var(--accent);
            background: rgba(124, 77, 255, 0.05);
            box-shadow: inset 0 0 60px rgba(124, 77, 255, 0.04);
        }
        .drop-zone.drag-active {
            border-style: solid;
            background: rgba(124, 77, 255, 0.1);
            transform: scale(1.01);
        }
        .drop-zone-icon {
            font-size: 3em;
            margin-bottom: 12px;
            display: block;
        }
        .drop-zone h3 {
            font-size: 1.2em;
            margin-bottom: 6px;
            color: var(--text);
        }
        .drop-zone p {
            color: var(--text2);
            font-size: 0.9em;
        }
        .drop-zone input[type="file"] {
            display: none;
        }
        .supported-formats {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .format-badge {
            background: var(--surface2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.78em;
            color: var(--text2);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* ===== GAME GRID ===== */
        .section-title {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--text2);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title .count {
            background: var(--surface2);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            color: var(--accent2);
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }
        .game-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        .game-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow);
            transform: translateY(-3px);
        }
        .game-card .game-icon {
            font-size: 2.5em;
            text-align: center;
            line-height: 1;
        }
        .game-card .game-name {
            font-weight: 700;
            font-size: 1em;
            text-align: center;
            word-break: break-word;
            line-height: 1.3;
        }
        .game-card .game-meta {
            font-size: 0.75em;
            color: var(--text2);
            text-align: center;
        }
        .game-card .card-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .game-card .card-actions .btn {
            flex: 1;
            justify-content: center;
            padding: 8px 10px;
            font-size: 0.8em;
        }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text2);
            grid-column: 1 / -1;
        }
        .empty-state .empty-icon {
            font-size: 4em;
            display: block;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        /* ===== GAME PLAYER OVERLAY ===== */
        .player-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 200;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .player-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .player-toolbar .game-title-display {
            font-weight: 700;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .player-iframe-container {
            flex: 1;
            background: #000;
            position: relative;
        }
        .player-iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .player-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 1.2em;
            pointer-events: none;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: var(--surface2);
            color: var(--text);
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--accent);
            box-shadow: var(--shadow);
            animation: slideIn 0.35s ease;
            pointer-events: auto;
            font-size: 0.9em;
            font-weight: 500;
            max-width: 400px;
        }
        .toast.error {
            border-left-color: var(--danger);
        }
        .toast.success {
            border-left-color: var(--success);
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(60px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            header {
                padding: 12px 16px;
                gap: 10px;
            }
            .logo {
                font-size: 1.3em;
            }
            .btn {
                padding: 9px 14px;
                font-size: 0.85em;
                gap: 5px;
            }
            main {
                padding: 16px;
                gap: 16px;
            }
            .drop-zone {
                padding: 28px 16px;
            }
            .game-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            .game-card {
                padding: 14px;
                gap: 8px;
            }
            .player-toolbar {
                padding: 8px 12px;
                gap: 8px;
            }
        }
        @media (max-width: 480px) {
            .game-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <header>
        <span class="logo">🎮 Game Launcher</span>
        <div class="header-actions">
            <button class="btn btn-outline btn-sm" onclick="clearAllGames()" title="Удалить все игры">
                🗑️ Очистить всё
            </button>
            <button class="btn btn-outline btn-sm" onclick="exportAllGames()" title="Скачать все игры одним ZIP-архивом">
                📦 Экспорт
            </button>
        </div>
    </header>

    <!-- ==================== MAIN ==================== -->
    <main>
        <!-- Зона загрузки -->
        <div class="drop-zone" id="dropZone">
            <span class="drop-zone-icon">📂</span>
            <h3>Перетащите файлы сюда</h3>
            <p>или нажмите, чтобы выбрать</p>
            <div class="supported-formats">
                <span class="format-badge">.ZIP архив</span>
                <span class="format-badge">.HTML файл</span>
                <span class="format-badge">Drag & Drop</span>
            </div>
            <input type="file" id="fileInput" accept=".zip,.html,.htm" multiple>
        </div>

        <!-- Список игр -->
        <div>
            <div class="section-title">
                📚 Мои игры <span class="count" id="gameCount">0</span>
            </div>
            <div class="game-grid" id="gameGrid">
                <div class="empty-state" id="emptyState">
                    <span class="empty-icon">🎲</span>
                    <p>Здесь пока нет игр.</p>
                    <p style="font-size:0.85em;">Загрузите HTML-файл или ZIP-архив с игрой</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ==================== ИГРОВОЙ ПЛЕЕР (скрыт) ==================== -->
    <div class="player-overlay" id="playerOverlay" style="display:none;">
        <div class="player-toolbar">
            <span class="game-title-display" id="playerTitle">🎮 Игра</span>
            <button class="btn btn-outline btn-sm" onclick="toggleFullscreen()" title="Полный экран">
                ⛶
            </button>
            <button class="btn btn-outline btn-sm" onclick="reloadGame()" title="Перезапустить игру">
                🔄
            </button>
            <button class="btn btn-danger btn-sm" onclick="closePlayer()" title="Закрыть игру">
                ✕ Закрыть
            </button>
        </div>
        <div class="player-iframe-container" id="playerContainer">
            <div class="player-placeholder" id="playerPlaceholder">Загрузка игры...</div>
            <iframe id="gameIframe" sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-modals allow-forms allow-popups" allow="fullscreen; autoplay; clipboard-write" loading="lazy"></iframe>
        </div>
    </div>

    <!-- ==================== TOAST КОНТЕЙНЕР ==================== -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            // ============ БАЗА ДАННЫХ (IndexedDB) ============
            const DB_NAME = 'GameLauncherDB';
            const DB_VERSION = 1;
            const STORE_NAME = 'games';
            let db = null;

            function openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const database = e.target.result;
                        if (!database.objectStoreNames.contains(STORE_NAME)) {
                            const store = database.createObjectStore(STORE_NAME, { keyPath: 'id' });
                            store.createIndex('name', 'name', { unique: false });
                            store.createIndex('addedAt', 'addedAt', { unique: false });
                        }
                    };
                    request.onsuccess = (e) => {
                        db = e.target.result;
                        resolve(db);
                    };
                    request.onerror = (e) => {
                        console.error('IndexedDB error:', e.target.error);
                        reject(e.target.error);
                    };
                });
            }

            function saveGameToDB(gameData) {
                return new Promise((resolve, reject) => {
                    if (!db) { reject('DB not open'); return; }
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.put(gameData);
                    request.onsuccess = () => resolve();
                    request.onerror = (e) => reject(e.target.error);
                });
            }

            function getAllGamesFromDB() {
                return new Promise((resolve, reject) => {
                    if (!db) { reject('DB not open'); return; }
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result || []);
                    request.onerror = (e) => reject(e.target.error);
                });
            }

            function deleteGameFromDB(id) {
                return new Promise((resolve, reject) => {
                    if (!db) { reject('DB not open'); return; }
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = (e) => reject(e.target.error);
                });
            }

            function clearAllGamesFromDB() {
                return new Promise((resolve, reject) => {
                    if (!db) { reject('DB not open'); return; }
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.clear();
                    request.onsuccess = () => resolve();
                    request.onerror = (e) => reject(e.target.error);
                });
            }

            // ============ УПРАВЛЕНИЕ СОСТОЯНИЕМ ============
            let gamesCache = [];
            let currentGameBlobUrl = null;
            let currentGameId = null;

            // ============ DOM ЭЛЕМЕНТЫ ============
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const gameGrid = document.getElementById('gameGrid');
            const emptyState = document.getElementById('emptyState');
            const gameCountEl = document.getElementById('gameCount');
            const playerOverlay = document.getElementById('playerOverlay');
            const playerTitle = document.getElementById('playerTitle');
            const gameIframe = document.getElementById('gameIframe');
            const playerPlaceholder = document.getElementById('playerPlaceholder');
            const toastContainer = document.getElementById('toastContainer');
            const playerContainer = document.getElementById('playerContainer');

            // ============ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ============
            function generateId() {
                return 'game_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            }

            function showToast(message, type = '') {
                const toast = document.createElement('div');
                toast.className = 'toast ' + type;
                toast.textContent = message;
                toastContainer.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.4s ease';
                    setTimeout(() => toast.remove(), 400);
                }, 3500);
            }

            function getFileExtension(filename) {
                return filename.split('.').pop().toLowerCase();
            }

            // ============ ОБРАБОТКА ZIP ============
            async function processZipFile(zipFile, zipFileName) {
                if (typeof JSZip === 'undefined') {
                    throw new Error('Библиотека JSZip не загружена. Проверьте подключение к интернету.');
                }
                const zip = await JSZip.loadAsync(zipFile);
                const files = Object.keys(zip.files).filter(f =>
                    !zip.files[f].dir && (f.endsWith('.html') || f.endsWith('.htm'))
                );

                if (files.length === 0) {
                    throw new Error('В ZIP-архиве не найдено HTML-файлов.');
                }

                // Ищем index.html или первый html
                let mainFile = files.find(f => f.toLowerCase().includes('index.html')) ||
                    files.find(f => f.toLowerCase().includes('index.htm')) ||
                    files[0];

                // Собираем полный архив как blob
                const fullZipBlob = await zip.generateAsync({ type: 'blob' });
                const blobUrl = URL.createObjectURL(fullZipBlob);

                const gameData = {
                    id: generateId(),
                    name: zipFileName.replace(/\.zip$/i, '') || 'Игра из ZIP',
                    type: 'zip',
                    blobUrl: blobUrl,
                    originalName: zipFileName,
                    mainFile: mainFile,
                    addedAt: Date.now(),
                };

                return gameData;
            }

            async function processHtmlFile(htmlFile) {
                const blobUrl = URL.createObjectURL(htmlFile);
                const gameData = {
                    id: generateId(),
                    name: htmlFile.name.replace(/\.html?$/i, '') || 'HTML Игра',
                    type: 'html',
                    blobUrl: blobUrl,
                    originalName: htmlFile.name,
                    mainFile: htmlFile.name,
                    addedAt: Date.now(),
                };
                return gameData;
            }

            async function handleFiles(files) {
                if (!files || files.length === 0) return;
                let addedCount = 0;
                const errors = [];

                for (const file of files) {
                    try {
                        const ext = getFileExtension(file.name);
                        let gameData = null;

                        if (ext === 'zip') {
                            gameData = await processZipFile(file, file.name);
                        } else if (ext === 'html' || ext === 'htm') {
                            gameData = await processHtmlFile(file);
                        } else {
                            errors.push(`Неподдерживаемый формат: ${file.name}`);
                            continue;
                        }

                        await saveGameToDB(gameData);
                        addedCount++;
                    } catch (err) {
                        errors.push(`${file.name}: ${err.message}`);
                        console.error('Ошибка обработки файла:', file.name, err);
                    }
                }

                if (addedCount > 0) {
                    showToast(`✅ Добавлено игр: ${addedCount}`, 'success');
                }
                if (errors.length > 0) {
                    errors.forEach(e => showToast('❌ ' + e, 'error'));
                }
                await refreshGameList();
            }

            // ============ ОТОБРАЖЕНИЕ ИГР ============
            async function refreshGameList() {
                gamesCache = await getAllGamesFromDB();
                gameGrid.innerHTML = '';
                gameCountEl.textContent = gamesCache.length;

                if (gamesCache.length === 0) {
                    gameGrid.innerHTML = `
                        <div class="empty-state" id="emptyState">
                            <span class="empty-icon">🎲</span>
                            <p>Здесь пока нет игр.</p>
                            <p style="font-size:0.85em;">Загрузите HTML-файл или ZIP-архив с игрой</p>
                        </div>`;
                    return;
                }

                // Сортируем: новые сверху
                gamesCache.sort((a, b) => b.addedAt - a.addedAt);

                gamesCache.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <div class="game-icon">${game.type === 'zip' ? '📦' : '🎯'}</div>
                        <div class="game-name" title="${escapeHtml(game.name)}">${escapeHtml(game.name)}</div>
                        <div class="game-meta">
                            ${game.type === 'zip' ? 'ZIP архив' : 'HTML файл'}
                            · ${new Date(game.addedAt).toLocaleDateString('ru-RU')}
                        </div>
                        <div class="card-actions">
                            <button class="btn btn-primary btn-sm play-btn" data-id="${game.id}">▶ Играть</button>
                            <button class="btn btn-outline btn-sm delete-btn" data-id="${game.id}" title="Удалить">🗑️</button>
                        </div>
                    `;
                    gameGrid.appendChild(card);
                });

                // Навешиваем обработчики
                document.querySelectorAll('.play-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.getAttribute('data-id');
                        launchGame(id);
                    });
                });
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.getAttribute('data-id');
                        deleteGame(id);
                    });
                });
                // Клик по карточке = запуск
                document.querySelectorAll('.game-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        if (e.target.closest('button')) return; // не срабатывает на кнопках
                        const playBtn = card.querySelector('.play-btn');
                        if (playBtn) {
                            const id = playBtn.getAttribute('data-id');
                            launchGame(id);
                        }
                    });
                });
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ============ ЗАПУСК ИГРЫ ============
            function launchGame(id) {
                const game = gamesCache.find(g => g.id === id);
                if (!game) {
                    showToast('Игра не найдена', 'error');
                    return;
                }

                // Очищаем предыдущий blob URL если был
                if (currentGameBlobUrl && currentGameId !== id) {
                    // Не освобождаем сразу, так как он может быть нужен
                }

                currentGameId = id;
                playerTitle.textContent = '🎮 ' + game.name;
                playerOverlay.style.display = 'flex';
                playerPlaceholder.style.display = 'flex';
                gameIframe.src = '';

                // Небольшая задержка для сброса iframe
                setTimeout(() => {
                    let srcUrl = game.blobUrl;

                    // Для ZIP нужно создать специальный URL с путём к главному файлу
                    if (game.type === 'zip' && game.mainFile) {
                        // Используем blobUrl и добавляем параметр для сервис-воркера
                        // Но так как мы используем blob, то for zip используем особый подход:
                        // создаём промежуточный HTML, который загружает содержимое из ZIP через JSZip
                        srcUrl = createZipLoaderUrl(game);
                    }

                    gameIframe.src = srcUrl;
                    currentGameBlobUrl = srcUrl;

                    gameIframe.onload = () => {
                        playerPlaceholder.style.display = 'none';
                    };
                    gameIframe.onerror = () => {
                        playerPlaceholder.style.display = 'flex';
                        playerPlaceholder.innerHTML =
                            '<span style="color:#ff5252;">⚠️ Ошибка загрузки игры. Возможно, файл повреждён.</span>';
                    };

                    // Таймаут: если игра не загрузилась за 10 секунд
                    setTimeout(() => {
                        if (playerPlaceholder.style.display !== 'none') {
                            playerPlaceholder.innerHTML =
                                '<span style="color:#ffa000;">⏳ Игра всё ещё загружается... Возможно, она тяжёлая.</span>';
                        }
                    }, 10000);
                }, 100);
            }

            function createZipLoaderUrl(game) {
                // Создаём HTML-страницу, которая распаковывает ZIP и показывает главный файл
                const loaderHtml = `<!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>${escapeHtml(game.name)}</title>
        <style>body{margin:0;padding:0;overflow:hidden;background:#000;} iframe{width:100vw;height:100vh;border:none;}</style>
        </head>
        <body>
        <iframe id="contentFrame" sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-modals allow-forms allow-popups" allow="fullscreen; autoplay; clipboard-write"></iframe>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"><\/script>
        <script>
        (async function(){
            try{
                const response = await fetch('${game.blobUrl}');
                const blob = await response.blob();
                const zip = await JSZip.loadAsync(blob);
                const mainFile = '${game.mainFile.replace(/'/g, "\\'")}';
                const file = zip.file(mainFile);
                if(!file) throw new Error('Main file not found: ' + mainFile);
                const content = await file.async('text');
                const blobHtml = new Blob([content], {type:'text/html'});
                const url = URL.createObjectURL(blobHtml);
                document.getElementById('contentFrame').src = url;
            }catch(e){
                document.body.innerHTML = '<div style="color:red;padding:20px;font-family:sans-serif;">❌ Ошибка загрузки: ' + e.message + '</div>';
            }
        })();
        <\/script>
        </body>
        </html>`;
                const loaderBlob = new Blob([loaderHtml], { type: 'text/html' });
                return URL.createObjectURL(loaderBlob);
            }

            function closePlayer() {
                playerOverlay.style.display = 'none';
                gameIframe.src = '';
                playerPlaceholder.style.display = 'flex';
                playerPlaceholder.innerHTML = 'Загрузка игры...';
                currentGameId = null;
                // Не освобождаем blobUrl здесь, так как он хранится в БД
            }

            function reloadGame() {
                if (currentGameId) {
                    launchGame(currentGameId);
                }
            }

            function toggleFullscreen() {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    playerContainer.requestFullscreen().catch(() => {
                        // Fallback: открываем iframe в полный экран
                        if (gameIframe.requestFullscreen) {
                            gameIframe.requestFullscreen().catch(() => {});
                        }
                    });
                }
            }

            // ============ УДАЛЕНИЕ ============
            async function deleteGame(id) {
                if (!confirm('Удалить эту игру? Это действие нельзя отменить.')) return;
                const game = gamesCache.find(g => g.id === id);
                if (game && game.blobUrl) {
                    URL.revokeObjectURL(game.blobUrl);
                }
                await deleteGameFromDB(id);
                if (currentGameId === id) {
                    closePlayer();
                }
                await refreshGameList();
                showToast('Игра удалена', 'success');
            }

            async function clearAllGames() {
                if (!confirm('Удалить ВСЕ игры? Это действие нельзя отменить.')) return;
                // Освобождаем все blob URL
                for (const game of gamesCache) {
                    if (game.blobUrl) URL.revokeObjectURL(game.blobUrl);
                }
                await clearAllGamesFromDB();
                closePlayer();
                await refreshGameList();
                showToast('Все игры удалены', 'success');
            }

            async function exportAllGames() {
                if (gamesCache.length === 0) {
                    showToast('Нет игр для экспорта', 'error');
                    return;
                }
                if (typeof JSZip === 'undefined') {
                    showToast('Библиотека JSZip не загружена. Нужен интернет для экспорта.', 'error');
                    return;
                }
                try {
                    const zip = new JSZip();
                    const folder = zip.folder('html5-games-backup');
                    for (const game of gamesCache) {
                        const response = await fetch(game.blobUrl);
                        const blob = await response.blob();
                        const ext = game.type === 'zip' ? 'zip' : 'html';
                        folder.file(game.name + '.' + ext, blob);
                    }
                    const content = await zip.generateAsync({ type: 'blob' });
                    const downloadUrl = URL.createObjectURL(content);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = 'html5-games-backup-' + new Date().toISOString().slice(0, 10) + '.zip';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(downloadUrl);
                    showToast('📦 Архив с играми скачан!', 'success');
                } catch (err) {
                    showToast('Ошибка экспорта: ' + err.message, 'error');
                }
            }

            // ============ DRAG & DROP ============
            dropZone.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
                fileInput.value = '';
            });

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.classList.add('drag-active');
            });
            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.classList.remove('drag-active');
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.classList.remove('drag-active');
                const files = e.dataTransfer.files;
                if (files && files.length > 0) {
                    handleFiles(files);
                }
            });

            // Глобальный drag & drop (на всю страницу)
            document.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (!playerOverlay.style.display || playerOverlay.style.display === 'none') {
                    dropZone.classList.add('drag-active');
                }
            });
            document.addEventListener('dragleave', (e) => {
                if (e.relatedTarget === null) {
                    dropZone.classList.remove('drag-active');
                }
            });
            document.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-active');
                if (playerOverlay.style.display && playerOverlay.style.display !== 'none') return;
                const files = e.dataTransfer.files;
                if (files && files.length > 0) {
                    handleFiles(files);
                }
            });

            // ============ КЛАВИШИ ============
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && playerOverlay.style.display === 'flex') {
                    closePlayer();
                }
            });

            // ============ ИНИЦИАЛИЗАЦИЯ ============
            async function init() {
                try {
                    await openDB();
                    await refreshGameList();
                    console.log('🎮 Game Launcher готов! IndexedDB подключена.');
                } catch (err) {
                    console.error('Ошибка инициализации:', err);
                    showToast('⚠️ Ошибка доступа к хранилищу. Игры не будут сохраняться между сессиями.', 'error');
                    // Пробуем работать без БД
                    gamesCache = [];
                    refreshGameList();
                }
            }

            // Экспорт функций в глобальную область для onclick в HTML
            window.clearAllGames = clearAllGames;
            window.exportAllGames = exportAllGames;
            window.closePlayer = closePlayer;
            window.reloadGame = reloadGame;
            window.toggleFullscreen = toggleFullscreen;
            window.launchGame = launchGame;
            window.deleteGame = deleteGame;

            init();
        })();
    </script>
</body>
</html>
